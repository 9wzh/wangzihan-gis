<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园地图导航WebGIS系统</title>
    <!-- 引入OpenLayers CSS和JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.1/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.5.1/build/ol.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map" class="map"></div>
    <!-- 工具栏 -->
    <div class="toolbar">
        <button id="draw-point">标注POI</button>
        <button id="draw-line">绘制路径</button>
        <button id="clear">清除绘图</button>
        <div id="coordinate-info">当前坐标：暂无</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
